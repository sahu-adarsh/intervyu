name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            cd /home/ubuntu/intervyu

            echo "Pulling latest changes..."
            git checkout -- .
            git pull origin main

            echo "Activating virtual environment..."
            source backend/venv/bin/activate

            echo "Installing/updating dependencies..."
            pip install -r backend/requirements.txt --quiet

            echo "Restarting backend service..."
            sudo systemctl restart intervyu-backend

            echo "Waiting for service to come up..."
            sleep 3
            sudo systemctl is-active --quiet intervyu-backend && echo "Service is running." || (echo "Service failed to start!" && sudo journalctl -u intervyu-backend -n 50 && exit 1)