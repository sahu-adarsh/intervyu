name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env.local
        working-directory: frontend
        run: |
          echo "NEXT_PUBLIC_API_URL=https://api.intervyu.io" > .env.local
          echo "NEXT_PUBLIC_WS_URL=wss://api.intervyu.io" >> .env.local

      - name: Copy VAD assets
        working-directory: frontend
        run: npm run copy-vad-assets

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync frontend/out/ s3://prepai-frontend-1773670407/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      - name: Sync HTML/JSON to S3 (no cache)
        run: |
          aws s3 sync frontend/out/ s3://prepai-frontend-1773670407/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EEQ8MGLCMSZXT \
            --paths "/*"