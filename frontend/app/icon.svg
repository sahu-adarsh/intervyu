  <rect x="38" y="20" width="24" height="34" rx="12" fill="white"/>
  <!-- Microphone arc -->
  <path d="M28 52 Q28 72 50 72 Q72 72 72 52" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
