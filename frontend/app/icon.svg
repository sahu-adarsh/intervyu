  <line x1="50" y1="72" x2="50" y2="82" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="36" y1="82" x2="64" y2="82" stroke="white" stroke-width="5" stroke-linecap="round"/>
</svg>
